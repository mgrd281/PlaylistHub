<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep cinematic black with subtle warm center -->
    <radialGradient id="bg" cx="50%" cy="44%" r="72%" fx="50%" fy="44%">
      <stop offset="0%" stop-color="#141018"/>
      <stop offset="100%" stop-color="#08080C"/>
    </radialGradient>
    <!-- Mark: rich coral-red gradient, top-left to bottom-right -->
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F44E30"/>
      <stop offset="50%" stop-color="#E83828"/>
      <stop offset="100%" stop-color="#C82A1A"/>
    </linearGradient>
    <!-- Soft ambient glow behind the mark -->
    <radialGradient id="glow" cx="50%" cy="44%" r="36%">
      <stop offset="0%" stop-color="#E83828" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#E83828" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#E83828" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="510" cy="430" rx="320" ry="280" fill="url(#glow)"/>

  <!-- The Play-P Mark
       A bold geometric "P" where the bowl is a play-triangle.
       Stem: left vertical bar with rounded ends.
       Bowl: triangle pointing right, meeting stem at top and mid-height.
       Below the bowl, the stem continues down — classic P proportions. -->
  <g filter="url(#shadow)">
    <!-- Stem: rounded rectangle -->
    <rect x="296" y="196" width="112" height="632" rx="20" ry="20" fill="url(#mark)"/>
    <!-- Bowl / Play triangle: rounded tip via quadratic bezier -->
    <path d="
      M 408 228
      L 408 228
      L 692 398
      Q 724 416, 692 434
      L 408 604
      Z
    " fill="url(#mark)"/>
  </g>

  <!-- Subtle specular highlight on the stem top -->
  <rect x="296" y="196" width="112" height="80" rx="20" ry="20" fill="white" opacity="0.06"/>
</svg>
