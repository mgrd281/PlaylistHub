<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>PlaylistHub — App Icon</title>

  <defs>
    <!-- Deep cinematic background: blue-black with warm center -->
    <radialGradient id="bg" cx="512" cy="480" r="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0F1C"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>

    <!-- Frame: premium diagonal-lit blue -->
    <linearGradient id="frame" x1="0.12" y1="0.08" x2="0.88" y2="0.92">
      <stop offset="0%" stop-color="#5B9AFF"/>
      <stop offset="42%" stop-color="#3B7BEF"/>
      <stop offset="100%" stop-color="#1A3594"/>
    </linearGradient>

    <!-- Ambient aura behind the portal -->
    <radialGradient id="aura" cx="512" cy="512" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.06"/>
      <stop offset="75%" stop-color="#2563EB" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-light sheen on frame surface -->
    <linearGradient id="sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Deep cinematic background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient aura -->
  <ellipse cx="512" cy="512" rx="380" ry="380" fill="url(#aura)"/>

  <!-- ─── The Cinematic Portal ───
       A bold rounded-rect frame with a play-triangle
       carved as negative space. One unified shape.
       Frame reads as a cinema screen / media portal.
       The triangle void points forward — play. -->

  <!-- Portal frame: solid blue rounded rectangle -->
  <rect x="108" y="108" width="808" height="808" rx="180" fill="url(#frame)"/>

  <!-- Top-light sheen (rendered before triangle so triangle covers it) -->
  <rect x="108" y="108" width="808" height="808" rx="180" fill="url(#sheen)"/>

  <!-- Play triangle void: dark cutout revealing the background -->
  <polygon
    points="393,312 393,712 733,512"
    fill="#0A0C18"
    stroke="#0A0C18"
    stroke-width="14"
    stroke-linejoin="round"/>

  <!-- Hairline glass edge on frame for subtle depth -->
  <rect x="109" y="109" width="806" height="806" rx="179"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1.5"/>
</svg>
