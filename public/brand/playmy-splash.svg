<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <title>PlayMy — Splash Screen</title>

  <defs>
    <!-- Background: deep cinematic black with warm spotlight -->
    <radialGradient id="bgSpot" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#12121E"/>
      <stop offset="100%" stop-color="#06060A"/>
    </radialGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#F0C850"/>
      <stop offset="50%" stop-color="#D4952A"/>
      <stop offset="100%" stop-color="#A86C10"/>
    </linearGradient>

    <!-- Stem gradient -->
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4DC"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="glow" cx="56%" cy="46%" r="36%">
      <stop offset="0%" stop-color="#D4952A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D4952A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="url(#bgSpot)"/>

  <!-- ═══════════════════════════════════════
       Icon Mark — centered at ~y=360
       (above vertical center for premium feel)
       ═══════════════════════════════════════ -->

  <!-- Ambient glow -->
  <ellipse cx="206" cy="356" rx="62" ry="54" fill="url(#glow)"/>

  <!-- Play triangle (rendered first) -->
  <polygon
    points="200,326 200,388 251,357"
    fill="url(#accent)"
    stroke="url(#accent)"
    stroke-width="6"
    stroke-linejoin="round"/>

  <!-- P vertical stem (capsule, covers triangle left edge) -->
  <rect x="176" y="318" width="18" height="120" rx="9" fill="url(#stem)"/>

  <!-- ═══════════════════════════════════════
       Wordmark — centered below the mark
       ═══════════════════════════════════════ -->

  <g>
    <!-- "Pl" -->
    <text x="131" y="490"
          font-family="'SF Pro Display', Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="38"
          fill="#FAFAFA"
          letter-spacing="-1.5">Pl</text>

    <!-- Play triangle inline -->
    <polygon
      points="176,467 176,490 195,478.5"
      fill="url(#accent)"
      stroke="url(#accent)"
      stroke-width="3.5"
      stroke-linejoin="round"/>

    <!-- "y" -->
    <text x="198" y="490"
          font-family="'SF Pro Display', Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="38"
          fill="#FAFAFA"
          letter-spacing="-0.5">y</text>

    <!-- "My" sub-brand -->
    <text x="224" y="490"
          font-family="'SF Pro Display', Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="500"
          font-size="26"
          fill="#D4952A"
          letter-spacing="1">My</text>
  </g>

  <!-- Subtle tagline (optional — remove if not needed) -->
  <text x="195" y="524"
        font-family="'SF Pro Display', Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="11"
        fill="#A1A1AA"
        text-anchor="middle"
        letter-spacing="3.5"
        text-transform="uppercase">YOUR WORLD. YOUR STREAM.</text>
</svg>
