<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>PlayMy — App Icon</title>

  <defs>
    <!-- Background: deep cinematic dark with subtle blue undertone -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="100%" stop-color="#07070B"/>
    </linearGradient>

    <!-- Accent: rich amber-gold diagonal gradient -->
    <linearGradient id="accent" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#F0C850"/>
      <stop offset="40%" stop-color="#D4952A"/>
      <stop offset="100%" stop-color="#A86C10"/>
    </linearGradient>

    <!-- Ambient glow behind the play triangle -->
    <radialGradient id="glow" cx="60%" cy="42%" r="32%">
      <stop offset="0%" stop-color="#D4952A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#D4952A" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle top-edge highlight on stem -->
    <linearGradient id="stemHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="8%" stop-color="#F8F6F0"/>
      <stop offset="100%" stop-color="#E8E4DC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="570" cy="415" rx="250" ry="210" fill="url(#glow)"/>

  <!-- ─── The Play-P Mark ───
       A geometric "P" where the bowl is a play-triangle.
       Stem: slim capsule bar, warm white.
       Bowl: equilateral-ish triangle with rounded corners (amber-gold).
       Below the bowl, the stem continues — classic P letterform. -->

  <!-- Play triangle (rendered first; stem overlaps its left edge) -->
  <polygon
    points="397,272 397,558 707,415"
    fill="url(#accent)"
    stroke="url(#accent)"
    stroke-width="26"
    stroke-linejoin="round"/>

  <!-- P vertical stem (capsule, on top — covers triangle's left stroke bleed) -->
  <rect x="305" y="232" width="80" height="560" rx="40" fill="url(#stemHL)"/>

  <!-- Hairline inner border for iOS depth -->
  <rect x="1" y="1" width="1022" height="1022"
        fill="none" stroke="#FAFAFA" stroke-opacity="0.025" stroke-width="1"/>
</svg>
